---
version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 3
    labels: ['dependencies']
    commit-message:
      prefix: 'fix'
      prefix-development: 'chore(deps)'
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    groups:
      npm-minor-and-patch:
        applies-to: 'version-updates'
        update-types: ['minor', 'patch']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 3
    labels: ['dependencies']
    commit-message:
      prefix: 'ci(deps)'
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    groups:
      github-actions:
        applies-to: 'version-updates'
        update-types: ['minor', 'patch']
