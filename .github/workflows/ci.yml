---
name: '🏗️ CI'

on:
  pull_request:
    branches: ['main', 'beta']
  push:
    branches: ['main', 'beta']

permissions:
  contents: 'read'

jobs:
  ci:
    runs-on: ['ubuntu-latest']
    timeout-minutes: 10
    concurrency:
      group: 'ci-${{ github.workflow }}-${{ github.ref }}'
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    permissions:
      contents: 'read'
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}

      - name: 'Setup Node.js'
        uses: actions/setup-node@v6.4.0
        with: { node-version-file: '.nvmrc' }

      - name: 'Install'
        run: HUSKY=0 npm ci --no-fund --no-audit

      - name: 'Test'
        run: npm run test

      - name: 'Upload coverage report'
        uses: actions/upload-artifact@v7.0.1
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        with:
          name: 'cobertura-report'
          path: 'coverage/cobertura-coverage.xml'
          if-no-files-found: 'error'

      - name: 'Audit'
        run: npm audit signatures

      - name: 'Lint'
        run: npm run lint:check

      - name: 'Format'
        run: npm run format:check

      - name: 'Build'
        run: npm run build

  upload-coverage:
    name: 'Upload coverage'
    needs: ['ci']
    if: ${{ !cancelled() && needs.ci.result == 'success' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ['ubuntu-latest']
    timeout-minutes: 10
    permissions:
      contents: 'read'
      code-quality: 'write' # to upload coverage to GitHub's code coverage API
      pull-requests: 'read' # to resolve the PR number on push events
    steps:
      - name: 'Download coverage report'
        uses: actions/download-artifact@v8.0.1
        with:
          name: 'cobertura-report'

      - name: 'Upload to code coverage API'
        uses: actions/upload-code-coverage@v1.3.0
        with:
          file: 'cobertura-coverage.xml'
          language: 'TypeScript'
          label: 'code-coverage/jest'
