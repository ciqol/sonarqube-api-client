services:
  sonarqube:
    image: 'sonarqube:lts-community'
    container_name: 'sonarqube'
    ports:
      - '9000:9000'
    environment:
      # Disable the Elasticsearch bootstrap checks so SonarQube boots with its
      # embedded H2 database in constrained local/CI environments. H2 is for
      # evaluation and testing only — never run SonarQube on H2 in production.
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: 'true'
    stop_grace_period: '1m'
